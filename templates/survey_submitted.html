{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="text-success" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                
                <h2 class="fw-bold">Response Recorded!</h2>
                <p class="text-muted mb-4">
                    Thank you for participating in the <strong>"{{ survey_title }}"</strong> survey. 
                    Your feedback has been successfully saved to our database.
                </p>
                
                <hr class="my-4">
                
                <div class="d-grid gap-2">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                        Return to Dashboard
                    </a>
                    <p class="mt-2 text-secondary small">
                        Want to create your own? <a href="{{ url_for('create_survey') }}">Click here</a>.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
