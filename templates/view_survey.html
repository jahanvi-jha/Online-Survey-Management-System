{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title">{{ survey.title }}</h2>
                <p class="text-muted">{{ survey.description }}</p>
                <hr>
                
                <form action="{{ url_for('submit_survey', survey_id=survey.id) }}" method="POST">
                    {% for question in survey.questions %}
                    <div class="mb-4">
                        <h5>{{ loop.index }}. {{ question.text }}</h5>
                        {% for option in question.options %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" 
                                   name="question_{{ question.id }}" 
                                   value="{{ option.id }}" 
                                   id="option_{{ option.id }}" required>
                            <label class="form-check-label" for="option_{{ option.id }}">
                                {{ option.option_text }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Submit Response</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
